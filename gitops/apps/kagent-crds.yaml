# Wave 0 — kagent CRDs (upstream OCI Helm chart; NOT vendored).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kagent-crds
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: ghcr.io/kagent-dev/kagent/helm
    chart: kagent-crds
    targetRevision: "0.9.10" # pinned; verify latest + crds parity (see gitops/README.md)
  destination:
    server: https://kubernetes.default.svc
    namespace: kagent
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false # kagent ns is created by Terraform (infra/03-argocd)
      - ServerSideApply=true # CRDs are large — avoid the client-side annotation limit
