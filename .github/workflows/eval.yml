# CI quality gate: builds the eval-runner image, runs it as a Job inside the
# `kagent` namespace (real in-cluster Service DNS, no port-forward), and fails
# the check if any agent's eval suite fails. See eval/README.md.
#
# Set repo variable AWS_GHA_EVAL_ROLE_ARN to the bootstrap output
# `github_actions_eval_role_arn` (a separate, write-scoped role from the
# read-only AWS_GHA_ROLE_ARN used by terraform-plan.yml).
name: eval

on:
  pull_request:
    paths:
      - "agents/**"
      - "eval/**"
      - "platform/kagent/**"
  workflow_dispatch:

permissions:
  id-token: write # required for OIDC
  contents: read

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_GHA_EVAL_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Log in to ECR
        run: |
          aws ecr get-login-password --region ap-southeast-1 \
            | docker login --username AWS --password-stdin 622629043701.dkr.ecr.ap-southeast-1.amazonaws.com

      - name: Build and push eval-runner image
        working-directory: eval
        run: |
          docker build -t 622629043701.dkr.ecr.ap-southeast-1.amazonaws.com/aria/eval-runner:${{ github.sha }} .
          docker push 622629043701.dkr.ecr.ap-southeast-1.amazonaws.com/aria/eval-runner:${{ github.sha }}

      - name: Configure kubectl
        run: aws eks update-kubeconfig --name aria --region ap-southeast-1

      - name: Apply eval Job
        id: apply
        run: |
          RUN_ID="${{ github.run_id }}-${{ github.run_attempt }}"
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          sed \
            -e "s/__IMAGE_TAG__/${{ github.sha }}/" \
            -e "s/__RUN_ID__/$RUN_ID/" \
            eval/job.yaml | kubectl apply -f -

      - name: Wait for eval Job
        # `kubectl wait --for=condition=complete` blocks for the FULL timeout when a
        # Job fails rather than completes - Complete and Failed are separate condition
        # types, not one "finished" state. Poll for either terminal condition instead.
        run: |
          # 3 agents run sequentially in one container (~3min each + image pull) -
          # 10min wasn't enough (measured ~11min actual runtime), give real headroom.
          JOB="job/aria-eval-${{ steps.apply.outputs.run_id }}"
          for i in $(seq 1 120); do
            STATUS=$(kubectl get "$JOB" -n kagent -o jsonpath='{.status.conditions[?(@.status=="True")].type}')
            if [ "$STATUS" = "Complete" ] || [ "$STATUS" = "Failed" ]; then
              echo "Job finished: $STATUS"
              exit 0
            fi
            sleep 10
          done
          echo "Timed out waiting for job to finish"
          exit 1

      - name: Show eval output
        if: always()
        run: |
          kubectl logs -n kagent job/aria-eval-${{ steps.apply.outputs.run_id }} --tail=-1

      - name: Fail if the eval Job failed
        run: |
          kubectl get job/aria-eval-${{ steps.apply.outputs.run_id }} -n kagent \
            -o jsonpath='{.status.conditions[?(@.type=="Complete")].status}' | grep -q True
