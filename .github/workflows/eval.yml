# CI quality gate: runs on a self-hosted runner living INSIDE the aria cluster (Actions
# Runner Controller, platform/arc/) so it can reach agent Services directly - no Docker
# build, no ECR push, no cross-network kubectl polling (the previous approach, retired
# after a session's worth of debugging exactly those cross-network failure modes).
# See eval/README.md.
name: eval

on:
  pull_request:
    paths:
      - "agents/**"
      - "eval/**"
      - "platform/kagent/**"
  workflow_dispatch:

jobs:
  eval:
    runs-on: aria-runners
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js and promptfoo
        working-directory: eval
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq nodejs npm > /dev/null
          npm install --no-save promptfoo@0.121.17

      - name: Run eval suite
        working-directory: eval
        run: sh run-all.sh
