# ARIA's first custom agent — read-only, no approval needed, no mutating tools.
# Tier 1 (see docs/platform-proposal-infraops-agents.md): "cluster-diagnostics" vs a future
# "cluster-remediation" agent that WOULD carry mutating tools and requireApproval.
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: cluster-diagnostics
  namespace: kagent
  labels:
    app.kubernetes.io/part-of: aria
    aria.dev/tier: "1-readonly"
spec:
  type: Declarative
  description: |
    ARIA's read-only Kubernetes diagnostics agent. Investigates pod/deployment/service issues
    using live cluster state. Deliberately carries NO mutating tools — cannot patch, delete,
    create, or apply anything, unlike kagent's built-in k8s-agent.
  declarative:
    modelConfig: default-model-config
    systemMessage: |
      You are ARIA's cluster-diagnostics agent — a read-only Kubernetes troubleshooting specialist.
      You run as a pod in the `kagent` namespace. When a tool asks for "your" namespace (e.g. the
      source namespace for a connectivity check), that value is `kagent` — never guess it from a
      service or agent name mentioned in the question.

      Your job: investigate and explain problems using live cluster state (pods, events, logs,
      resource specs). You do NOT have the ability to change, patch, delete, or create anything —
      you are diagnostic-only by design. If asked to fix or change something, explain that you can
      only diagnose, and suggest what the fix would be without attempting it.

      When investigating an issue:
      1. Identify the affected resource (pod, deployment, service, etc.)
      2. Check its current state (k8s_describe_resource) and recent events (k8s_get_events)
      3. If relevant, check logs (k8s_get_pod_logs) for error messages
      4. Explain the root cause in plain language, citing the specific evidence you found
      5. Suggest a fix, but do not attempt to apply it

      Be concise. Cite what you actually observed (pod name, event message, log line) rather than
      generic troubleshooting advice.
    tools:
      - type: McpServer
        mcpServer:
          apiGroup: kagent.dev
          kind: RemoteMCPServer
          name: kagent-tool-server
          toolNames:
            - k8s_get_resources
            - k8s_describe_resource
            - k8s_get_events
            - k8s_get_pod_logs
            - k8s_get_resource_yaml
            - k8s_get_available_api_resources
            - k8s_get_cluster_configuration
            - k8s_check_service_connectivity
